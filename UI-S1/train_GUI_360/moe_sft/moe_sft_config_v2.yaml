# MoE SFT v2 Training Configuration
# Fix router collapse from v1 (Job 2610726):
#   - balance_weight: 0.0 → 0.1 (entropy-based balance loss)
#   - z_loss_weight: 0.0 → 0.01 (stabilize router logits)
#   - learning_rate: 5e-5 → 2e-5 (experts already warm from copy-init)
#   - warmup_ratio: 0.05 → 0.1 (gentler start)
#   - save_steps: 500 → 200 (monitor collapse more frequently)
#
# Uses copy-init checkpoint: all experts start with expert_1's trained weights,
# router re-initialized for uniform routing.

# === Base Model ===
model_name_or_path: "checkpoints/Qwen2.5-VL-7B-Instruct"
torch_dtype: "bfloat16"
attn_implementation: "flash_attention_2"

# === MoE Configuration ===
moe:
  num_experts: 6
  top_k: 6
  expert_lora_r: 16
  expert_lora_alpha: 32
  expert_lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  router_hidden: 256
  router_dropout: 0.1
  router_temperature: 1.0
  pooling_strategy: "mean"
  use_vectorized_routing: true
  # v2: Enable balance loss to prevent router collapse
  balance_weight: 0.1
  balance_type: "entropy"       # entropy more suitable than mse for preventing collapse
  z_loss_weight: 0.01           # stabilize router logits

# === Training Data ===
data:
  train_file: "train_GUI_360/llamafactory/data/gui360_train.json"
  data_format: "sharegpt"
  max_seq_length: 4096
  image_min_pixels: 256
  image_max_pixels: 1003520

# === Training Hyperparameters ===
training:
  output_dir: "train_GUI_360/moe_sft/output/moe_sft_v2"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  # effective batch = 4 nodes * 4 gpus * 1 * 16 = 256
  learning_rate: 2.0e-5          # lower than v1 (5e-5) since experts are warm
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1              # longer warmup for stability
  max_grad_norm: 0.5
  bf16: true
  gradient_checkpointing: false
  dataloader_num_workers: 4
  logging_steps: 10
  save_steps: 200                # more frequent saves to monitor collapse
  save_total_limit: 10
  seed: 42
  report_to: "wandb"
  run_name: "moe_sft_v2_entropy_balance"

# === DeepSpeed ===
deepspeed: "train_GUI_360/moe_sft/ds_z2_config.json"
